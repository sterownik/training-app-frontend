<div class="tra-navigation__container"
     routerLinkActive="active-link"
     [routerLinkActiveOptions]="{exact: true}">
  <a class="tra-navigation__item"
     routerLink="/activities"
     routerLinkActive
     routerLinkActive="active-link">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="48"
         height="48"
         viewBox="0 0 48 48"
         fill="currentColor">
      <!-- bullets -->
      <rect x="6"
            y="10"
            width="6"
            height="6"
            rx="1" />
      <rect x="6"
            y="21"
            width="6"
            height="6"
            rx="1" />
      <rect x="6"
            y="32"
            width="6"
            height="6"
            rx="1" />

      <!-- lines -->
      <rect x="16"
            y="11"
            width="26"
            height="4"
            rx="2" />
      <rect x="16"
            y="22"
            width="26"
            height="4"
            rx="2" />
      <rect x="16"
            y="33"
            width="26"
            height="4"
            rx="2" />
    </svg>

  </a>
  <a class="tra-navigation__item"
     routerLink="/ai-guestion"
     routerLinkActive="active-link">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="48"
         height="48"
         viewBox="0 0 48 48"
         fill="currentColor">
      <!-- circle -->
      <circle cx="24"
              cy="24"
              r="20"
              fill="none"
              stroke="currentColor"
              stroke-width="4" />

      <!-- question mark -->
      <path d="M19 18a5 5 0 1 1 7.5 4.3c-1.6.9-2.5 1.9-2.5 3.7"
            fill="none"
            stroke="currentColor"
            stroke-width="4"
            stroke-linecap="round" />

      <!-- dot -->
      <circle cx="24"
              cy="33"
              r="2.5"
              fill="currentColor" />
    </svg>

  </a>

  <a class="tra-navigation__item"
     routerLinkActive="active-link">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="48"
         height="48"
         viewBox="0 0 48 48"
         fill="currentColor">
      <!-- axes -->
      <path d="M8 8v32h32"
            fill="none"
            stroke="currentColor"
            stroke-width="4"
            stroke-linecap="round" />

      <!-- line chart -->
      <path d="M12 30l8-8 6 6 10-12"
            fill="none"
            stroke="currentColor"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round" />

      <!-- points -->
      <circle cx="12"
              cy="30"
              r="2.5" />
      <circle cx="20"
              cy="22"
              r="2.5" />
      <circle cx="26"
              cy="28"
              r="2.5" />
      <circle cx="36"
              cy="16"
              r="2.5" />
    </svg>

  </a>
</div>
